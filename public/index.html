<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Yun's Recs</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-neutral-50 text-neutral-900 antialiased">
  <div id="map" class="fixed inset-0"></div>

  <!-- Filter bar -->
  <div id="filters" class="fixed top-3 left-1/2 -translate-x-1/2 z-10 flex flex-wrap gap-1 bg-white/90 backdrop-blur rounded-full shadow-md px-2 py-1 max-w-[80vw]"></div>

  <!-- Language toggle -->
  <button id="lang-toggle" class="fixed top-3 right-3 z-10 w-10 h-10 rounded-full bg-white/90 backdrop-blur shadow-md font-semibold text-sm hover:bg-white" aria-label="Toggle language">中</button>

  <!-- Desktop sidebar -->
  <aside id="sidebar" class="hidden md:flex fixed top-0 right-0 h-full w-[420px] bg-white shadow-xl z-20 translate-x-full transition-transform duration-300 flex-col">
    <button id="sidebar-close" class="absolute top-3 right-3 w-9 h-9 rounded-full bg-neutral-100 hover:bg-neutral-200 flex items-center justify-center text-xl leading-none" aria-label="Close">×</button>
    <div id="sidebar-content" class="overflow-y-auto p-8 prose prose-neutral max-w-none"></div>
  </aside>

  <!-- Mobile bottom sheet -->
  <div id="sheet" class="md:hidden fixed inset-x-0 bottom-0 z-20 bg-white rounded-t-2xl shadow-2xl translate-y-full transition-transform duration-300 max-h-[85vh] flex flex-col">
    <div class="flex-shrink-0 pt-2 pb-1 flex justify-center">
      <div class="w-10 h-1.5 rounded-full bg-neutral-300"></div>
    </div>
    <button id="sheet-close" class="absolute top-2 right-3 w-8 h-8 rounded-full bg-neutral-100 flex items-center justify-center text-lg" aria-label="Close">×</button>
    <div id="sheet-content" class="overflow-y-auto px-5 pb-8 prose prose-neutral max-w-none"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
